<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">

  <title>A la cARta Demo</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 40px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    model-viewer {
      width: 100%;
      height: 75vh;
      background: #222;
    }
  </style>
</head>

<body>

  <h1>A la cARta</h1>

  <p>
    Mira el platillo en 3D y prueba AR
  </p>

  <model-viewer
    src="Cake.glb"
    ar
    ar-modes="webxr scene-viewer"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="Platillo 3D">
  </model-viewer>

</body>

</html>
