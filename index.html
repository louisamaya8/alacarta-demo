<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>A la cARta Demo</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 22px;
      font-size: 36px;
    }

    p {
      font-size: 17px;
      margin-bottom: 14px;
      padding: 0 20px;
    }

    model-viewer {
      width: 100%;
      height: 78vh;
      background: #222;
    }

.ar-button {
  background: #ffffff;
  color: #111;
  border: none;
  border-radius: 999px;

  padding: 22px 42px;

  font-size: 26px;
  font-weight: bold;

  box-shadow: 0 6px 18px rgba(0,0,0,0.45);

  position: absolute;
  bottom: 34px;
  left: 50%;
  transform: translateX(-50%);

  cursor: pointer;

  width: 85%;
  max-width: 420px;
}
      font-weight: bold;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      cursor: pointer;
    }

    .ar-button:active {
      transform: translateX(-50%) scale(0.96);
    }
  </style>
</head>

<body>

  <h1>A la cARta</h1>

  <p>Visualiza el platillo en 3D y colócalo en tu mesa.</p>

  <model-viewer
    src="Cake.glb"
    ios-src="Cake (1).usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="Platillo 3D">

    <button slot="ar-button" class="ar-button">
      Presiona aquí para ver en AR
    </button>

  </model-viewer>

</body>
</html>
